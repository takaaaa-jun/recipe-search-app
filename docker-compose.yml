services:
  app:
    image: node:24-alpine
    container_name: recipe-search-app-frontend
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "8004:8004"
    # react-router-domを含めてインストールしてからdevサーバーを起動
    command: sh -c "npm install && npm run dev -- --host --port 8004"
    stdin_open: true
    tty: true
    networks:
      - default
      - shared-gateway-net
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: recipe-search-app-backend
    ports:
      - "8005:8005"
    environment:
      - PORT=8005
      # MySQL接続設定（food_ideathon と同じDBに接続）
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    networks:
      - default
      - shared-gateway-net
      - food_ideathon_backend
    restart: unless-stopped

volumes:
  db_data:


networks:
  shared-gateway-net:
    external: true
  food_ideathon_backend:
    external: true
